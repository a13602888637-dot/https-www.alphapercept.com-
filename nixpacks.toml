# Nixpacks configuration for Python service
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["cd python-data-service && pip install -r requirements.txt"]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "cd python-data-service && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
