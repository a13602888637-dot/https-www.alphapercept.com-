[build]
builder = "NIXPACKS"
watchPatterns = ["python-data-service/**"]

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"

[[deploy.environmentVariables]]
name = "PYTHON_VERSION"
value = "3.11"
